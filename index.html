<!DOCTYPE html>
<html>
<head>
    <title>나의 영업 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-3xl font-bold mb-6 text-blue-600">📊 엑셀 영업 대시보드</h1>
        <input type="file" id="upload" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 mb-6"/>
        <div id="result" class="grid grid-cols-2 gap-4">
            <div class="p-4 bg-blue-50 rounded-lg"><p class="text-sm">총 매출</p><p id="sales" class="text-2xl font-bold">₩ 0</p></div>
            <div class="p-4 bg-green-50 rounded-lg"><p class="text-sm">데이터 건수</p><p id="count" class="text-2xl font-bold">0건</p></div>
        </div>
        <div class="mt-8 p-4 border rounded">
            <p class="text-gray-400 text-center">엑셀을 업로드하면 여기에 데이터 요약이 표시됩니다.</p>
        </div>
    </div>
    <script>
        document.getElementById('upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet);
                
                document.getElementById('sales').innerText = '₩ ' + rows.length * 150000; // 예시 계산
                document.getElementById('count').innerText = rows.length + '건';
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });
    </script>
</body>
</html>
