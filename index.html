<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>영업 실적 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-extrabold text-gray-800">📊 Sales Dashboard</h1>
            <label class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow-md transition">
                엑셀 파일 업로드
                <input type="file" id="upload" class="hidden" accept=".xlsx, .xls" />
            </label>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-sm text-gray-500 uppercase font-bold">총 매출액</p>
                <p id="totalSales" class="text-2xl font-black text-gray-800 mt-2">₩ 0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-sm text-gray-500 uppercase font-bold">총 판매 수량</p>
                <p id="totalCount" class="text-2xl font-black text-gray-800 mt-2">0건</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-purple-500">
                <p class="text-sm text-gray-500 uppercase font-bold">평균 단가</p>
                <p id="avgPrice" class="text-2xl font-black text-gray-800 mt-2">₩ 0</p>
            </div>
        </div>

        <div class="bg-white p-8 rounded-xl shadow-sm border mb-10">
            <h3 class="text-lg font-bold text-gray-700 mb-6">항목별 매출 현황</h3>
            <canvas id="salesChart" width="400" height="150"></canvas>
        </div>
    </div>

    <script>
        let myChart;

        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet);

                // 데이터 계산 (엑셀 컬럼에 '매출' 혹은 'Sales'가 있다고 가정)
                let total = 0;
                let labels = [];
                let values = [];

                rows.forEach((row, index) => {
                    const val = row['매출'] || row['Sales'] || row['price'] || 0;
                    const label = row['상품명'] || row['Product'] || row['item'] || `데이터 ${index+1}`;
                    total += Number(val);
                    labels.push(label);
                    values.push(val);
                });

                // 화면 업데이트
                document.getElementById('totalSales').innerText = '₩ ' + total.toLocaleString();
                document.getElementById('totalCount').innerText = rows.length.toLocaleString() + '건';
                document.getElementById('avgPrice').innerText = '₩ ' + (rows.length > 0 ? Math.round(total/rows.length).toLocaleString() : 0);

                // 차트 그리기
                if (myChart) myChart.destroy();
                const ctx = document.getElementById('salesChart').getContext('2d');
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels.slice(0, 10), // 상위 10개만 표시
                        datasets: [{
                            label: '매출액',
                            data: values.slice(0, 10),
                            backgroundColor: '#3b82f6',
                            borderRadius: 5
                        }]
                    }
                });
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
