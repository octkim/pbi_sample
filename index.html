<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital & Recurring Sales Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <div class="flex h-screen overflow-hidden">
        <div class="flex-1 overflow-y-auto p-8">
            
            <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">📊 세일즈 대시보드 (Capital & Recurring)</h1>
                    <p class="text-sm text-slate-500 mt-1">파일을 여러 개 동시에 선택해서 올리면 데이터가 자동으로 합산됩니다.</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="resetData()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold py-3 px-6 rounded-xl transition">
                        <i class="fas fa-undo"></i> 초기화
                    </button>
                    <label class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition flex items-center gap-2">
                        <i class="fas fa-file-upload"></i> 파일 다중 업로드
                        <input type="file" id="upload" class="hidden" accept=".xlsx, .xls, .csv" multiple />
                    </label>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 border-l-4 border-l-blue-500">
                    <p class="text-sm font-semibold text-slate-500 mb-1">총 매출액 (Total Revenue)</p>
                    <h2 id="totalRevenue" class="text-3xl font-bold text-slate-800">₩ 0</h2>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 border-l-4 border-l-indigo-500">
                    <p class="text-sm font-semibold text-slate-500 mb-1">장비 매출 (Capital)</p>
                    <h2 id="capitalRevenue" class="text-3xl font-bold text-slate-800">₩ 0</h2>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 border-l-4 border-l-emerald-500">
                    <p class="text-sm font-semibold text-slate-500 mb-1">소모품 매출 (Recurring)</p>
                    <h2 id="recurringRevenue" class="text-3xl font-bold text-slate-800">₩ 0</h2>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 border-l-4 border-l-amber-500">
                    <p class="text-sm font-semibold text-slate-500 mb-1">총 판매 건수</p>
                    <h2 id="totalOrders" class="text-3xl font-bold text-slate-800">0 건</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-lg font-bold text-slate-800 mb-4">📈 장비(Capital) 상위 품목 매출</h3>
                    <div class="relative h-72">
                        <canvas id="capitalChart"></canvas>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-lg font-bold text-slate-800 mb-4">🔄 소모품(Recurring) 상위 품목 매출</h3>
                    <div class="relative h-72">
                        <canvas id="recurringChart"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let capitalChartInstance = null;
        let recurringChartInstance = null;

        let globalTotalRev = 0, globalCapRev = 0, globalRecRev = 0, globalTotalOrders = 0;
        let globalCapData = {}, globalRecData = {};

        function resetData() {
            globalTotalRev = 0; globalCapRev = 0; globalRecRev = 0; globalTotalOrders = 0;
            globalCapData = {}; globalRecData = {};
            updateUI();
        }

        document.getElementById('upload').addEventListener('change', async function(e) {
            const files = e.target.files;
            if (files.length === 0) return;

            for (let i = 0; i < files.length; i++) {
                await processFile(files[i]);
            }

            updateUI();
            e.target.value = '';
        });

        function processFile(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const data = new Uint8Array(evt.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet);

                    if (rows.length === 0) {
                        resolve(); return;
                    }

                    globalTotalOrders += rows.length;

                    const keys = Object.keys(rows[0]);
                    
                    // 금액 인식 키워드 대폭 추가 (price, total, sum 등)
                    const amountKey = keys.find(k => /amount|value|매출|금액|sales|revenue|price|total|sum/i.test(k)) || keys[keys.length - 1];
                    const productKey = keys.find(k => /product|item|material|상품|제품|모델|description/i.test(k)) || keys[0];
                    const typeKey = keys.find(k => /type|category|구분|분류|class/i.test(k));

                    rows.forEach(row => {
                        // 핵심 수정 부분: 숫자 이외의 문자(쉼표, 화폐기호 등)를 모두 제거한 뒤 숫자로 변환
                        let rawAmount = row[amountKey] || "0";
                        let cleanAmountString = String(rawAmount).replace(/[^0-9.-]+/g, "");
                        let amount = parseFloat(cleanAmountString) || 0;

                        let product = row[productKey] || '알 수 없음';
                        let type = typeKey ? (row[typeKey] || '').toString().toLowerCase() : '';
                        let fileName = file.name.toLowerCase();

                        globalTotalRev += amount;

                        if (type.includes('recurring') || type.includes('소모품') || fileName.includes('recurring')) {
                            globalRecRev += amount;
                            globalRecData[product] = (globalRecData[product] || 0) + amount;
                        } else {
                            globalCapRev += amount;
                            globalCapData[product] = (globalCapData[product] || 0) + amount;
                        }
                    });
                    resolve();
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function updateUI() {
            document.getElementById('totalRevenue').innerText = '₩ ' + globalTotalRev.toLocaleString(undefined, {maximumFractionDigits: 0});
            document.getElementById('capitalRevenue').innerText = '₩ ' + globalCapRev.toLocaleString(undefined, {maximumFractionDigits: 0});
            document.getElementById('recurringRevenue').innerText = '₩ ' + globalRecRev.toLocaleString(undefined, {maximumFractionDigits: 0});
            document.getElementById('totalOrders').innerText = globalTotalOrders.toLocaleString() + ' 건';

            capitalChartInstance = renderChart('capitalChart', capitalChartInstance, globalCapData, '#6366f1');
            recurringChartInstance = renderChart('recurringChart', recurringChartInstance, globalRecData, '#10b981');
        }

        function renderChart(chartId, chartInstance, dataObj, color) {
            const ctx = document.getElementById(chartId).getContext('2d');
            if (chartInstance) chartInstance.destroy();
            
            const sortedData = Object.entries(dataObj).sort((a, b) => b[1] - a[1]).slice(0, 10);
            
            return new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedData.map(d => d[0].substring(0, 15)),
                    datasets: [{
                        label: '매출액',
                        data: sortedData.map(d => d[1]),
                        backgroundColor: color,
                        borderRadius: 6,
                        barThickness: 20
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { borderDash: [2, 4] } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>
